<div class="employee-list">
  <div class="employee-list-header">
    <h2>Employee List</h2>


    <button class="btn btn-primary" routerLink="/admin/employees/create">
  Add Employee
</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Contact</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let emp of employees">
        <td>{{ emp.name }}</td>
        <td>{{ emp.email }}</td>
        <td>{{ emp.contact }}</td>
        <td class="actions">
          <button class="btn btn-outline" (click)="editEmployee(emp)">
            Edit
          </button>
          <button class="btn btn-danger" (click)="openConfirm(emp._id)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>


  <div class="modal-backdrop" *ngIf="showConfirm">
  <div class="modal">
    <p>Are you sure you want to delete this employee?</p>

    <div class="modal-actions">
      <button class="btn btn-outline" (click)="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" (click)="confirmDelete()">Delete</button>
    </div>
  </div>

  

</div>
</div>
