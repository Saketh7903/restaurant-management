<div class="create-page">
  <h2>Create Employee</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="form-group">
      <label>Name</label>
      <input formControlName="name" type="text" />
      <small *ngIf="f['name'].touched && f['name'].errors?.['required']">
        Name is required
      </small>
      <small *ngIf="f['name'].touched && f['name'].errors?.['minlength']">
        Name must be at least 3 characters
      </small>
      <small *ngIf="f['name'].touched && f['name'].errors?.['pattern']">
        First letter must be capital and only alphabets allowed
      </small>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input formControlName="email" type="email" />
      <small *ngIf="f['email'].touched && f['email'].invalid">
        Valid email is required
      </small>
    </div>

    <div class="form-group">
      <label>Contact</label>
      <input formControlName="contact" type="text" />
      <small *ngIf="f['contact'].touched && f['contact'].invalid">
        Contact must be a 10-digit number
      </small>
    </div>

    <div class="actions">
      <button class="btn secondary" type="button" (click)="cancel()">Cancel</button>
      <button class="btn primary" type="submit">Create</button>
    </div>

  </form>
</div>
