<div class="employee-form">
  <h2>{{ employee ? 'Edit Employee' : 'Add Employee' }}</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

   <div class="form-group">
  <label for="name">Name</label>
  <input id="name" type="text" formControlName="name" />


  <small class="error"
         *ngIf="f['name']?.touched && f['name']?.errors?.['required']">
    Name is required
  </small>

  <small class="error"
         *ngIf="f['name']?.touched && f['name']?.errors?.['minlength']">
    Name must be at least 3 characters
  </small>


  <small class="error"
         *ngIf="f['name']?.touched && f['name']?.errors?.['pattern']">
    First letter must be capital and only alphabets allowed
  </small>
</div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
      <small class="error" *ngIf="f['email']?.touched && f['email']?.invalid">
        Enter a valid email address
      </small>
    </div>

    <div class="form-group">
      <label for="contact">Contact</label>
      <input id="contact" type="text" formControlName="contact" />
      <small class="error" *ngIf="f['contact']?.touched && f['contact']?.invalid">
        Contact must be a 10-digit number
      </small>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Save</button>
      <button class="btn btn-outline" type="button" (click)="onCancel()">Cancel</button>
    </div>

  </form>
</div>
