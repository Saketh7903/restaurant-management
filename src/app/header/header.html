<header *ngIf="isLoggedIn()">
  <div class="left">
    <h3>Feane Admin</h3>
    <nav class="admin-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/admin/employees" routerLinkActive="active">Employees</a>
      <a routerLink="/admin/menu" routerLinkActive="active">Menu</a>
      <a routerLink="/admin/bookings" routerLinkActive="active">Bookings</a>
    </nav>
  </div>
  <div class="right">
    <span class="username">Hi, {{ userName }}</span>
    <button (click)="logout()">Sign Out</button>
  </div>
</header>
